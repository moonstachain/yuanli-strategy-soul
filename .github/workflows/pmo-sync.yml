name: PMO Sync

on:
  workflow_dispatch:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled]
  pull_request:
    types: [opened, edited, closed, reopened, synchronize]

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/sync-pmo-dashboard.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit dashboard update
        run: |
          if git diff --quiet docs/pmo-dashboard-data.js; then
            echo "No PMO dashboard changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/pmo-dashboard-data.js
            git commit -m "sync pmo dashboard"
            git push
          fi
