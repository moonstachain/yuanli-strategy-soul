name: Daily CBM Review

on:
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-daily-cbm-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate daily CBM review
        run: node scripts/generate-daily-cbm-review.js

      - name: Commit generated review artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/daily-cbm-review-latest.md brain/evolution-notes/*-daily-cbm-review.md
          if git diff --cached --quiet; then
            echo "No daily CBM review changes to commit."
          else
            git commit -m "chore: generate daily CBM review"
            git push
          fi
