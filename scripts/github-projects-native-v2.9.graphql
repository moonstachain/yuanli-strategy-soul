# GitHub Projects v2 GraphQL skeleton for Yuanli PMO OS.
# Fill in owner login, repository id, and project id before running.

query FindRepo($owner:String!, $name:String!) {
  repository(owner:$owner, name:$name) { id name url }
}

mutation CreateProject($ownerId:ID!) {
  createProjectV2(input:{ownerId:$ownerId, title:"Yuanli PMO OS"}) {
    projectV2 { id title url }
  }
}

# Field creation uses createProjectV2Field and createProjectV2SingleSelectField.
