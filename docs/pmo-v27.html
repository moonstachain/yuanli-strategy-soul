<!doctype html>
<meta charset="utf-8">
<title>Yuanli PMO OS v2.7</title>
<script src="pmo-dashboard-data.js"></script>
<style>
body{margin:0;background:#05070b;color:#f1ece1;font:14px/1.5 -apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}header{padding:28px 32px;border-bottom:1px solid #263036;background:#0d1214}h1{margin:0;color:#c9a96a}.sub{color:#8a918c}.wrap{display:grid;grid-template-columns:1.2fr 1fr;gap:18px;padding:24px}.card{background:#0d1214;border:1px solid #263036;border-radius:18px;padding:18px}.wide{grid-column:1/3}.gold{color:#c9a96a}.muted{color:#8a918c}.ok{color:#7fb88a}.warn{color:#d2a24c}.bad{color:#c97a72}.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}.kpi{background:#101820;border:1px solid #263036;border-radius:16px;padding:14px}.kpi b{display:block;font-size:24px;color:#c9a96a}.chain{display:grid;grid-template-columns:1fr auto 1fr auto 1fr auto 1fr auto 1fr;gap:10px;align-items:center}.arrow{color:#c9a96a;font-size:22px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.pill{display:inline-block;border:1px solid #8b6f2e;border-radius:999px;padding:3px 9px;color:#c9a96a;margin:3px 5px 3px 0}.link{color:#6eb7a8;text-decoration:none}.big{font-size:30px;color:#c9a96a}.rank{font-size:44px;color:#c9a96a;font-weight:700}.mini{font-size:12px;color:#8a918c}table{width:100%;border-collapse:collapse}td,th{border-top:1px solid #263036;padding:8px;text-align:left}@media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr)}.chain{grid-template-columns:1fr}.arrow{display:none}}@media(max-width:900px){.wrap{grid-template-columns:1fr}.wide{grid-column:auto}.grid{grid-template-columns:1fr}}
</style>
<header><h1>Yuanli PMO OS v2.7</h1><div class="sub">Overview-first cockpit · total system health before local dispatch detail</div></header>
<div class="wrap">
<section class="card wide"><h2 class="gold">Executive Overview</h2><div id="overview" class="kpis"></div></section>
<section class="card wide"><h2 class="gold">Strategic Signal</h2><div id="signal"></div></section>
<section class="card wide"><h2 class="gold">Operating Chain</h2><div id="chain" class="chain"></div></section>
<section class="card"><h2 class="gold">C3 Gap Ranking</h2><div id="ranking"></div></section>
<section class="card"><h2 class="gold">Selected Gap → C4 Task</h2><div id="handoff"></div></section>
<section class="card"><h2 class="gold">Evidence & Learning</h2><div id="learning"></div></section>
<section class="card"><h2 class="gold">Six PMO Views</h2><div id="views" class="grid"></div></section>
<section class="card"><h2 class="gold">PMO Fields</h2><div id="fields"></div></section>
<section class="card wide"><h2 class="gold">Raw PMO Items</h2><table id="items"></table></section>
</div>
<script>
(function(){
 const d=window.YUANLI_PMO_V22||{}; const items=d.seed_items||[]; const repo='https://github.com/moonstachain/yuanli-strategy-soul/issues/'; const docs='https://github.com/moonstachain/yuanli-strategy-soul/blob/main/';
 function issue(id){return '<a class="link" target="_blank" href="'+repo+String(id).replace('#','')+'">'+id+'</a>'}
 function file(path,label){return '<a class="link" target="_blank" href="'+docs+path+'">'+label+'</a>'}
 function k(label,value,note,cls){return '<div class="kpi"><span class="mini">'+label+'</span><b class="'+(cls||'')+'">'+value+'</b><span class="muted">'+note+'</span></div>'}
 const gaps=items.filter(x=>x.type==='gap'), tasks=items.filter(x=>x.type==='task'), evs=items.filter(x=>x.type==='evidence');
 const weak=items.filter(x=>x.evidence==='weak').length; const red=items.filter(x=>x.health==='red').length; const health=red?'Red':weak?'Yellow':'Green'; const cls=red?'bad':weak?'warn':'ok'; const coverage=Math.round((evs.length/Math.max(1,gaps.length+tasks.length))*100)+'%'; const g=(d.gap_ranking||[])[0]||{}; const nextP0=g.issue||'#63';
 document.getElementById('overview').innerHTML=k('PMO Health',health,weak?'weak evidence exists':'no red signal',cls)+k('UI Version','v2.7','overview-first cockpit')+k('Data Version',d.version||'v2.4','issue-driven source')+k('Open Items',items.length,'PMO objects tracked')+k('Evidence Coverage',coverage,'evidence / gaps+tasks')+k('Next P0',nextP0,'strategic focus','warn');
 document.getElementById('signal').innerHTML='System state: <b class="gold">PMO has moved from local dispatch to overview-first management.</b><br>Current strategic signal: keep #63 as the single P0 until C3 gap ranking can reliably hand off selected gaps into C4 execution and evidence review.<br>'+file('docs/pmo-weekly-review-latest.md','Open Weekly Review')+' · '+file('brain/evolution-notes/2026-06-30-weekly-pmo-review.md','Open Evolution Note');
 const by={}; items.forEach(x=>by[x.issue]=x); function box(x,label){x=x||{};return '<div class="card"><div class="mini">'+label+'</div><h3>'+(x.issue?issue(x.issue):'-')+' · '+(x.node||'PMO')+' '+(x.type||'work')+'</h3><div>status: <b>'+(x.status||'-')+'</b> · health: <b>'+(x.health||'-')+'</b> · priority: <b>'+(x.priority||'-')+'</b></div><div>gap score: <span class="big">'+(x.gap_score||'-')+'</span></div><div class="muted">next: '+(x.next||'-')+'</div></div>'}
 function linkBox(label,url,title,body){return '<div class="card"><div class="mini">'+label+'</div><h3><a class="link" target="_blank" href="'+url+'">'+title+'</a></h3><div class="muted">'+body+'</div></div>'}
 document.getElementById('chain').innerHTML=box(by['#63']||gaps[0],'C3 Strategic Judgment')+'<div class="arrow">→</div>'+box(by['#64']||tasks[0],'C4 Execution Task')+'<div class="arrow">→</div>'+box(by['#65']||evs[0],'Evidence Review')+'<div class="arrow">→</div>'+linkBox('Weekly Review','pmo-weekly-review-latest.md','PMO Weekly Review','issue data becomes management signal')+'<div class="arrow">→</div>'+linkBox('Evolution Note','../brain/evolution-notes/2026-06-30-weekly-pmo-review.md','Brain Writeback','management signal becomes reusable learning');
 document.getElementById('ranking').innerHTML='<div class="rank">#'+(g.rank||1)+'</div><h3>'+issue(g.issue||'#63')+' '+(g.gap||'gap')+'</h3><div>score: <span class="big">'+(g.score||'')+'</span></div><div class="muted">formula: '+(g.formula||'')+'</div><div>selected: <b class="ok">'+(g.selected?'true':'false')+'</b></div>';
 document.getElementById('handoff').innerHTML='<h3>'+issue('#63')+' → '+issue('#64')+'</h3><p>Top ranked C3 gap is handed off as a C4 execution task.</p><p class="muted">The next issue carries objective, steps, acceptance, evidence, risk, and writeback target.</p>';
 document.getElementById('learning').innerHTML='<h3>'+issue('#65')+' + '+file('brain/evolution-notes/2026-06-30-weekly-pmo-review.md','Evolution Note')+'</h3><p>Evidence Review validates the chain; Weekly Review converts operating signal into reusable organizational learning.</p><p class="ok">Current evidence strength: medium</p>';
 document.getElementById('views').innerHTML=(d.views||[]).map(v=>'<div class="card"><b>'+v.name+'</b><br><span class="muted">'+v.layout+' · '+v.purpose+'</span></div>').join(''); document.getElementById('fields').innerHTML=(d.fields||[]).map(x=>'<span class="pill">'+x+'</span>').join('');
 document.getElementById('items').innerHTML='<tr><th>Issue</th><th>Node</th><th>Type</th><th>Status</th><th>Health</th><th>Priority</th><th>Gap</th><th>Evidence</th><th>Next</th></tr>'+items.map(x=>'<tr><td>'+issue(x.issue)+'</td><td>'+x.node+'</td><td>'+x.type+'</td><td>'+x.status+'</td><td>'+x.health+'</td><td>'+x.priority+'</td><td>'+x.gap_score+'</td><td>'+x.evidence+'</td><td>'+x.next+'</td></tr>').join('');
})();
</script>
