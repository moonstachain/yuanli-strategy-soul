<!doctype html>
<meta charset="utf-8">
<title>Yuanli PMO OS v2.2</title>
<script src="pmo-dashboard-data.js"></script>
<style>
body{margin:0;background:#05070b;color:#f1ece1;font:14px/1.5 -apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}header{padding:28px 32px;border-bottom:1px solid #263036;background:#0d1214}h1{margin:0;color:#c9a96a}.sub{color:#8a918c}.wrap{display:grid;grid-template-columns:1.2fr 1fr;gap:18px;padding:24px}.card{background:#0d1214;border:1px solid #263036;border-radius:18px;padding:18px}.gold{color:#c9a96a}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.pill{display:inline-block;border:1px solid #8b6f2e;border-radius:999px;padding:3px 9px;color:#c9a96a;margin:3px 5px 3px 0}table{width:100%;border-collapse:collapse}td,th{border-top:1px solid #263036;padding:8px;text-align:left}.muted{color:#8a918c}
</style>
<header><h1>Yuanli PMO OS v2.2</h1><div class="sub">Strategic PMO cockpit for Canon · C3 Gap · C4 Task · Evidence · Evolution</div></header>
<div class="wrap">
  <section class="card"><h2 class="gold">Six PMO Views</h2><div id="views" class="grid"></div></section>
  <section class="card"><h2 class="gold">PMO Fields</h2><div id="fields"></div></section>
  <section class="card"><h2 class="gold">Seed Items</h2><table id="items"></table></section>
  <section class="card"><h2 class="gold">Automation</h2><div id="automation"></div><h2 class="gold">Metrics</h2><div id="metrics"></div></section>
</div>
<script>
(function(){
 const d=window.YUANLI_PMO_V22||{};
 const views=document.getElementById('views');
 views.innerHTML=(d.views||[]).map(v=>'<div class="card"><b>'+v.name+'</b><br><span class="muted">'+v.layout+' · '+v.purpose+'</span></div>').join('');
 document.getElementById('fields').innerHTML=(d.fields||[]).map(x=>'<span class="pill">'+x+'</span>').join('');
 document.getElementById('automation').innerHTML=(d.automation||[]).map(x=>'<div>→ '+x+'</div>').join('');
 document.getElementById('metrics').innerHTML=(d.metrics||[]).map(x=>'<span class="pill">'+x+'</span>').join('');
 const rows=(d.seed_items||[]).map(x=>'<tr><td>'+x.node+'</td><td>'+x.type+'</td><td>'+x.status+'</td><td>'+x.health+'</td><td>'+x.priority+'</td><td>'+x.gap_score+'</td><td>'+x.next+'</td></tr>').join('');
 document.getElementById('items').innerHTML='<tr><th>Node</th><th>Type</th><th>Status</th><th>Health</th><th>Priority</th><th>Gap</th><th>Next</th></tr>'+rows;
})();
</script>
