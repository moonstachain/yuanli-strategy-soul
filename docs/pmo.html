<!doctype html>
<meta charset="utf-8">
<title>Yuanli PMO OS</title>
<script src="pmo-dashboard-data.js"></script>
<style>
body{margin:0;background:#05070b;color:#f1ece1;font:14px/1.5 -apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}header{padding:28px 32px;border-bottom:1px solid #263036;background:#0d1214}h1{margin:0;color:#c9a96a}.sub{color:#8a918c}.wrap{display:grid;grid-template-columns:1.2fr 1fr;gap:18px;padding:24px}.card{background:#0d1214;border:1px solid #263036;border-radius:18px;padding:18px}.gold{color:#c9a96a}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.pill{display:inline-block;border:1px solid #8b6f2e;border-radius:999px;padding:3px 9px;color:#c9a96a;margin:3px 5px 3px 0}table{width:100%;border-collapse:collapse}td,th{border-top:1px solid #263036;padding:8px;text-align:left}.muted{color:#8a918c}.ok{color:#7fb88a}.warn{color:#d2a24c}.chain{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:10px;align-items:center}.arrow{color:#c9a96a;font-size:22px}.big{font-size:30px;color:#c9a96a}.link{color:#6eb7a8;text-decoration:none}.rank{font-size:44px;color:#c9a96a;font-weight:700}.mini{font-size:12px;color:#8a918c}.wide{grid-column:1/3}@media(max-width:900px){.wrap{grid-template-columns:1fr}.wide{grid-column:auto}.chain{grid-template-columns:1fr}.arrow{display:none}}
</style>
<header><h1 id="title">Yuanli PMO OS</h1><div class="sub" id="subtitle">Strategic PMO cockpit for Canon · C3 Gap · C4 Task · Evidence · Evolution</div></header>
<div class="wrap">
  <section class="card wide"><h2 class="gold">v2.3 Dispatch Chain</h2><div id="chain" class="chain"></div></section>
  <section class="card"><h2 class="gold">C3 Gap Ranking</h2><div id="ranking"></div></section>
  <section class="card"><h2 class="gold">Selected Gap → C4 Task</h2><div id="handoff"></div></section>
  <section class="card"><h2 class="gold">Evidence Review</h2><div id="evidence"></div></section>
  <section class="card"><h2 class="gold">Six PMO Views</h2><div id="views" class="grid"></div></section>
  <section class="card"><h2 class="gold">PMO Fields</h2><div id="fields"></div></section>
  <section class="card wide"><h2 class="gold">Seed Items</h2><table id="items"></table></section>
  <section class="card"><h2 class="gold">Automation</h2><div id="automation"></div><h2 class="gold">Metrics</h2><div id="metrics"></div></section>
</div>
<script>
(function(){
 const d=window.YUANLI_PMO_V22||{};
 const repo='https://github.com/moonstachain/yuanli-strategy-soul/issues/';
 const version=d.version||'v2.2';
 document.title='Yuanli PMO OS '+version;
 document.getElementById('title').textContent='Yuanli PMO OS '+version;
 document.getElementById('subtitle').textContent='Strategic PMO cockpit · C3 Gap #63 → C4 Task #64 → Evidence Review #65';
 const byIssue={};
 (d.seed_items||[]).forEach(x=>{byIssue[x.issue]=x;});
 function issueLink(id){return '<a class="link" target="_blank" href="'+repo+id.replace('#','')+'">'+id+'</a>'}
 function box(x,label){return '<div class="card"><div class="mini">'+label+'</div><h3>'+issueLink(x.issue)+' · '+x.node+' '+x.type+'</h3><div>status: <b>'+x.status+'</b> · health: <b>'+x.health+'</b> · priority: <b>'+x.priority+'</b></div><div>gap score: <span class="big">'+x.gap_score+'</span></div><div class="muted">next: '+x.next+'</div></div>'}
 const c3=byIssue['#63']||{}; const c4=byIssue['#64']||{}; const ev=byIssue['#65']||{};
 document.getElementById('chain').innerHTML=box(c3,'C3 Strategic Judgment')+'<div class="arrow">→</div>'+box(c4,'C4 Execution Task')+'<div class="arrow">→</div>'+box(ev,'Evidence Review');
 const g=(d.gap_ranking||[])[0]||{};
 document.getElementById('ranking').innerHTML='<div class="rank">#'+(g.rank||1)+'</div><h3>'+issueLink(g.issue||'#63')+' '+(g.gap||'gap')+'</h3><div>score: <span class="big">'+(g.score||'')+'</span></div><div class="muted">formula: '+(g.formula||'')+'</div><div>selected: <b class="ok">'+(g.selected?'true':'false')+'</b></div>';
 document.getElementById('handoff').innerHTML='<h3>'+issueLink('#63')+' → '+issueLink('#64')+'</h3><p>Top ranked C3 gap is handed off as a C4 execution task.</p><p class="muted">The next issue carries objective, steps, acceptance, evidence, risk, and writeback target.</p>';
 document.getElementById('evidence').innerHTML='<h3>'+issueLink('#65')+'</h3><p>Evidence Review validates the chain and points to brain/evidence plus brain/evolution-notes.</p><p class="ok">Current evidence strength: medium</p>';
 document.getElementById('views').innerHTML=(d.views||[]).map(v=>'<div class="card"><b>'+v.name+'</b><br><span class="muted">'+v.layout+' · '+v.purpose+'</span></div>').join('');
 document.getElementById('fields').innerHTML=(d.fields||[]).map(x=>'<span class="pill">'+x+'</span>').join('');
 document.getElementById('automation').innerHTML=(d.automation||[]).map(x=>'<div>→ '+x+'</div>').join('');
 document.getElementById('metrics').innerHTML=(d.metrics||[]).map(x=>'<span class="pill">'+x+'</span>').join('');
 const rows=(d.seed_items||[]).map(x=>'<tr><td>'+issueLink(x.issue)+'</td><td>'+x.node+'</td><td>'+x.type+'</td><td>'+x.status+'</td><td>'+x.health+'</td><td>'+x.priority+'</td><td>'+x.gap_score+'</td><td>'+x.evidence+'</td><td>'+x.next+'</td></tr>').join('');
 document.getElementById('items').innerHTML='<tr><th>Issue</th><th>Node</th><th>Type</th><th>Status</th><th>Health</th><th>Priority</th><th>Gap</th><th>Evidence</th><th>Next</th></tr>'+rows;
})();
</script>
